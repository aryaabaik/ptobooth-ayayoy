<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELECT FRAME — TIMELESS ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@300;600;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        /* --- DESIGN SYSTEM --- */
        :root {
            --bg: #0a0a0a;
            --paper: #f4f1ea;
            --ink: #111;
            --accent: #ff3e00;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body { 
            background: var(--bg); 
            color: var(--paper); 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND ELEMENTS --- */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 1000; pointer-events: none; opacity: 0.5;
        }

        /* --- CUSTOM CURSOR --- */
        #cursor {
            width: 20px; height: 20px;
            border: 1px solid var(--paper);
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease, background 0.3s ease;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }

        /* --- HEADER --- */
        .top-nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-family: 'Archivo Black';
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .session-info {
            font-family: 'Space Mono';
            font-size: 0.7rem;
            opacity: 0.6;
        }

        /* --- HERO --- */
        header {
            padding: 80px 40px 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Archivo Black';
            font-size: clamp(3rem, 12vw, 8rem);
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 40%, #555);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .subtitle {
            font-family: 'Space Mono';
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
            padding: 5px;
            background: var(--glass);
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 12px 25px;
            font-family: 'Outfit';
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--paper);
            color: var(--bg);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- GRID --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.8s ease;
        }

        .layout-grid.active {
            opacity: 1;
            transform: translateY(0);
            display: grid;
        }

        .layout-section { display: none; }
        .layout-section.active { display: block; }

        /* --- FRAME CARD --- */
        .frame-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            position: relative;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }

        .frame-card::before {
            content: "";
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .frame-card:hover::before { left: 100%; }

        .frame-card img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(1) brightness(0.8);
            transition: 0.5s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .frame-card:hover {
            border-color: var(--paper);
            transform: translateY(-10px);
            background: rgba(255,255,255,0.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .frame-card:hover img {
            filter: grayscale(0) brightness(1);
            transform: scale(1.02);
        }

        .card-meta {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-id {
            font-family: 'Space Mono';
            font-size: 0.7rem;
            color: var(--accent);
        }

        .card-label {
            font-size: 0.6rem;
            padding: 4px 8px;
            border: 1px solid var(--border);
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* --- FOOTER DECOR --- */
        .footer-line {
            position: fixed; bottom: 0; width: 100%;
            height: 5px; background: var(--accent);
            z-index: 200;
        }

        /* --- ANIMATIONS --- */
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .stagger-in { animation: staggerIn 0.6s cubic-bezier(0.19, 1, 0.22, 1) both; }
        @keyframes staggerIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            .container { padding: 0 20px 80px; }
            .top-nav { padding: 15px 20px; }
            .layout-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            * { cursor: auto !important; }
            #cursor { display: none; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>

    <nav class="top-nav">
        <div class="logo">TIMELESS</div>
        <div class="session-info">CORE_SYSTEM // ARCHIVE_01 // <span id="clock">00:00:00</span></div>
    </nav>

    <header>
        <div class="subtitle">Select Projection</div>
        <h1>VISUAL<br>ARTIFACT</h1>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('strip', this)">Archive Strip</button>
        <button class="tab-btn" onclick="switchTab('story', this)">Visual Story</button>
        <button class="tab-btn" onclick="switchTab('special', this)">High Risk</button>
    </div>

    <div class="container">
        <div id="strip" class="layout-section active">
            <div class="layout-grid active" id="grid-strip">
                <div class="frame-card stagger-in" style="animation-delay: 0.1s" onclick="selectLayout('layoutA', this)">
                    <img src="frames/1.png" alt="WHT-01">
                    <div class="card-meta">
                        <span class="card-id">WHT_01_CORE</span>
                        <span class="card-label">classic</span>
                    </div>
                </div>
                <div class="frame-card stagger-in" style="animation-delay: 0.2s" onclick="selectLayout('layoutB', this)">
                    <img src="frames/3.png" alt="BLK-02">
                    <div class="card-meta">
                        <span class="card-id">BLK_02_MONO</span>
                        <span class="card-label">brutal</span>
                    </div>
                </div>
                <div class="frame-card stagger-in" style="animation-delay: 0.3s" onclick="selectLayout('layoutC', this)">
                    <img src="frames/8.png" alt="RTR-03">
                    <div class="card-meta">
                        <span class="card-id">RTR_03_FILM</span>
                        <span class="card-label">retro</span>
                    </div>
                </div>
                <div class="frame-card stagger-in" style="animation-delay: 0.4s" onclick="selectLayout('layoutD', this)">
                    <img src="frames/2.png" alt="HND-04">
                    <div class="card-meta">
                        <span class="card-id">HND_04_ANALOG</span>
                        <span class="card-label">lo-fi</span>
                    </div>
                </div>
                <div class="frame-card stagger-in" style="animation-delay: 0.5s" onclick="selectLayout('layoutE', this)">
                    <img src="frames/4.png" alt="PNT-05">
                    <div class="card-meta">
                        <span class="card-id">PNT_05_SOFT</span>
                        <span class="card-label">matte</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="story" class="layout-section">
            <div class="layout-grid active">
                <div class="frame-card stagger-in" onclick="selectLayout('layoutG', this)">
                    <img src="frames/6.png" alt="WIN-98">
                    <div class="card-meta">
                        <span class="card-id">WIN_98_STORY</span>
                        <span class="card-label">modern</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="special" class="layout-section">
            <div class="layout-grid active">
                <div class="frame-card stagger-in" onclick="selectLayout('layoutI', this)">
                    <img src="frames/9.png" alt="Special">
                    <div class="card-meta">
                        <span class="card-id">VLT_01_RISK</span>
                        <span class="card-label">exclusive</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-line"></div>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('button, .frame-card').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
                cursor.style.background = 'var(--paper)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                cursor.style.background = 'transparent';
            });
        });

        // Clock
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function switchTab(tabId, btn) {
            document.querySelectorAll('.layout-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById(tabId);
            target.classList.add('active');
            btn.classList.add('active');

            // Re-trigger animations
            const cards = target.querySelectorAll('.frame-card');
            cards.forEach((card, i) => {
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = `staggerIn 0.6s cubic-bezier(0.19, 1, 0.22, 1) both ${i * 0.1}s`;
            });
        }

        function selectLayout(layoutName, element) {
            localStorage.setItem('selectedLayout', layoutName);
            
            // Success Feedback
            element.style.borderColor = 'var(--accent)';
            element.style.background = 'rgba(255, 62, 0, 0.1)';
            
            if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

            // Flash effect before leave
            document.body.style.transition = '0.3s';
            document.body.style.background = '#fff';

            setTimeout(() => {
                window.location.href = 'camera.html';
            }, 400);
        }
    </script>
</body>
</html>
